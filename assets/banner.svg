<!-- Name -->
<text x="292" y="62" fill="#00ff41" font-size="40" font-family="'Courier New', Courier, monospace" font-weight="bold" letter-spacing="5" opacity="0.95">NITIN</text>

<!-- Tagline -->
<text x="295" y="90" fill="#00cc33" font-size="13.5" font-family="monospace">
  Data Analyst  ──►  Data Engineer
</text>

<!-- Separator line -->
<line x1="292" y1="104" x2="846" y2="104" stroke="#00ff41" stroke-width="0.5" opacity="0.25"/>

<!-- Info rows -->
<text x="292" y="126" fill="#004d00" font-size="11.5" font-family="monospace">$  location  ./  Delhi, India  │  Remote-ready  │  Hybrid-open</text>
<text x="292" y="146" fill="#004d00" font-size="11.5" font-family="monospace">$  exp       ./  1.5 yrs Analytics  +  Active DE Build</text>
<text x="292" y="166" fill="#004d00" font-size="11.5" font-family="monospace">$  stack     ./  SQL │ Python │ Airflow │ dbt │ PySpark</text>
<text x="292" y="186" fill="#004d00" font-size="11.5" font-family="monospace">$  projects  ./  E-Commerce │ Retail DW │ Bike Store DB</text>
<text x="292" y="206" fill="#004d00" font-size="11.5" font-family="monospace">$  status    ./  </text>

<!-- OPEN TO WORK badge (animated) -->
<rect x="438" y="193" width="128" height="18" rx="3" fill="#001a00" stroke="#00ff41" stroke-width="0.8">
  <animate attributeName="stroke-opacity" values="0.5;1;0.5" dur="1.8s" repeatCount="indefinite"/>
</rect>
<text x="502" y="206" text-anchor="middle" fill="#00ff41" font-size="10" font-family="monospace">
  ● OPEN TO WORK
  <animate attributeName="opacity" values="0.7;1;0.7" dur="1.8s" repeatCount="indefinite"/>
</text>

<!-- Separator line -->
<line x1="292" y1="222" x2="846" y2="222" stroke="#00ff41" stroke-width="0.5" opacity="0.25"/>

<!-- DE Progress bar -->
<text x="292" y="240" fill="#003a00" font-size="10.5" font-family="monospace">DE Journey</text>
<rect x="376" y="228" width="220" height="14" fill="#001000" rx="3" stroke="#003300" stroke-width="0.5"/>
<rect x="376" y="228" width="154" height="14" fill="none" rx="3">
  <animate attributeName="width" from="0" to="154" dur="2.5s" fill="freeze"/>
  <animate attributeName="fill" from="#003300" to="#00ff41" dur="2.5s" fill="freeze"/>
</rect>
<!-- progress fill static fallback -->
<rect x="376" y="228" width="154" height="14" fill="#00cc33" rx="3" opacity="0.5"/>
<rect x="376" y="228" width="154" height="14" fill="#00ff41" rx="3" opacity="0.3"/>
<text x="604" y="240" fill="#00cc33" font-size="10.5" font-family="monospace">70%  →  Full DE</text>

<!-- Cert badges row -->
<rect x="292" y="253" width="62" height="15" rx="3" fill="#001500" stroke="#003d00" stroke-width="0.6"/>
<text x="323" y="264" text-anchor="middle" fill="#009922" font-size="8.5" font-family="monospace">Google DA</text>
<rect x="360" y="253" width="60" height="15" rx="3" fill="#001500" stroke="#003d00" stroke-width="0.6"/>
<text x="390" y="264" text-anchor="middle" fill="#009922" font-size="8.5" font-family="monospace">PL-300 BI</text>
<rect x="426" y="253" width="76" height="15" rx="3" fill="#001500" stroke="#003d00" stroke-width="0.6"/>
<text x="464" y="264" text-anchor="middle" fill="#009922" font-size="8.5" font-family="monospace">HackerRank 🥇</text>

<!-- Blinking cursor -->
<rect x="292" y="269" width="8" height="13" fill="#00ff41">
  <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
</rect>

<!-- Right corner bracket -->
<text x="820" y="270" fill="#004400" font-size="11" font-family="monospace">─┘</text>

</svg>
